<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Many Shades</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital@0;1&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --champagne: #F7E7CE; 
        }
        
        body, html { 
            margin: 0; padding: 0; 
            background: transparent; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh; width: 100vw; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; 
        }

        .container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            box-sizing: border-box;
        }

        #placeholder-text {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--champagne);
            padding: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .card-perspective { 
            perspective: 1200px; 
            width: 280px; 
            height: 400px; 
            display: none; 
        }
        
        .card-inner { 
            position: relative; 
            width: 100%; height: 100%; 
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; 
            cursor: pointer; 
        }
        
        .card-inner.flipped { transform: rotateY(180deg); }
        
        .card-face { 
            position: absolute; 
            width: 100%; height: 100%; 
            backface-visibility: hidden; 
            border-radius: 20px; 
            border: 2.5px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(0, 0, 0, 0.8); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(212,175,55,0.1);
            overflow: hidden;
        }
        
        .card-back { 
            transform: rotateY(180deg); 
            background: rgba(10, 10, 10, 0.98); 
            padding: 20px; 
            flex-direction: column;
            box-sizing: border-box; 
        }

        /* SCROLLING FEATURE FOR LONG TEXT */
        .shade-desc-container {
            width: 100%;
            max-height: 320px; /* Limits text height within the card */
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom Golden Scrollbar */
        .shade-desc-container::-webkit-scrollbar {
            width: 4px;
        }
        .shade-desc-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .shade-desc-container::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        .bitmoji-img { width: 100%; height: 100%; object-fit: contain; }
        
        .shade-title { 
            font-family: 'Cinzel', serif; 
            color: var(--gold); 
            font-size: 1.3rem; 
            margin: 15px 0 5px 0; 
            display: none; 
            text-align: center;
        }

        .shade-desc { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 1.05rem; 
            color: var(--champagne); 
            line-height: 1.6; 
            margin: 0;
            text-align: center;
        }

        .orb-menu { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .orb-btn { 
            width: 45px; height: 45px; 
            border-radius: 50%; 
            border: 1px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; background: rgba(255,255,255,0.05); 
            transition: 0.3s; font-size: 1.3rem; 
        }
        .orb-btn.active { background: var(--gold); box-shadow: 0 0 15px var(--gold); transform: scale(1.1); }
        .tap-hint { font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; display: none; margin-top: 5px; color: var(--gold); }
    </style>
</head>
<body>

    <div class="container">
        <div id="placeholder-text">
            Tap an icon below to see a shade of Jainthu...
        </div>

        <div class="card-perspective" id="cardArea">
            <div class="card-inner" id="bitmojiCard" onclick="this.classList.toggle('flipped')">
                <div class="card-face">
                    <img id="displayBitmoji" src="" class="bitmoji-img">
                </div>
                <div class="card-face card-back">
                    <div class="shade-desc-container" id="scrollBox">
                        <p id="shadeDescription" class="shade-desc"></p>
                    </div>
                </div>
            </div>
        </div>

        <h3 id="shadeTitle" class="shade-title"></h3>
        <p id="tapHint" class="tap-hint" font-style="bold">FLIP THE CARD😂</p>

        <div class="orb-menu">
            <div class="orb-btn" onclick="updateShade('goodboy', this)">😇</div>
            <div class="orb-btn" onclick="updateShade('helping', this)">🤝</div>
            <div class="orb-btn" onclick="updateShade('saithan', this)">😈</div>
            <div class="orb-btn" onclick="updateShade('guru', this)">🧘</div>
            <div class="orb-btn" onclick="updateShade('theivam', this)">🙏</div>
            <div class="orb-btn" onclick="updateShade('friend', this)">🩷</div>
        </div>
    </div>

    <script>
        const shadesData = {
            'goodboy': { img: 'WhatsApp Image 2026-05-08 at 10.22.57 PM.jpeg', t: 'The Good Boy😇', d: 'Jainthuva pathii namaku theriyum frndss😂 avan bad boythaan irnthaalu avan konjo nallla visayangal laam pannirkaan soo good boynnu vachikalam😂❤️✨️' },
            'helping': { img: 'WhatsApp Image 2026-05-08 at 10.22.58 PM.jpeg', t: 'Helping Minded🤗', d: 'Namma saithan helpnnu keeta udane senju kudupaan...Avanaala maximum mudinjatha pannuvaan🤗 Kastathula irkapooo help pannuvaan antha visayathulaa namma saithaan golduuu💥' },
            'saithan': { img: 'WhatsApp Image 2026-05-08 at 10.22.58 PM (1).jpeg', t: 'The Saithan👻', d: 'Aana ivan saathaarana saithan kedayathu pollaatha kalla saithan🤣Paaka paavam maari irnthuttu ellaaa kalla velayu pannu kallaa saithan🤣Batman aaa irkaanam soo gurlss paathu irnthukoonha ivantaa🤣 Batman❌️badman✌️ Kutty kutty setaigal pannuvan seetaikaarapaiiyan🤩😂' },
            'guru': { img: 'WhatsApp Image 2026-05-08 at 10.22.58 PM (2).jpeg', t: 'The Great Gurujii🫡', d: '1000 thaan irnthaalu enga gurujii maariii entha guruvayu naa ithuvara paakala 🙂‍↔️ Super man avaru💥Entha oru topicayu simple and superaaa solli tharathulaa en guruva adichika mudiyaathu🙂‍↔ Naa attend panra classlayee enku pudichaa classnaa athu en guruvooda seminar thaan poliyaaa irkm frnds💥Entha oru topicayu simple and superaaa solli tharathulaa en guruva adichika mudiyaathu! Enku pudichaa classnaa en guruvooda seminar thaan💥' },
            'theivam': { img: 'WhatsApp Image 2026-05-08 at 10.22.59 PM.jpeg', t: 'Our Class Super Hero💫', d: 'Simpleaaa onee linela solluren: <br><br><b>Jainthu illana naanga illaa ✨️😌</b>' },
            'friend': { img: 'WhatsApp Image 2026-05-08 at 10.22.59 PM (1).jpeg', t: 'My Special Friend🫶', d: 'Jainthu maari oru friend enakum enclasskum kedachathu rombaa santhoosam✨️ Ennooda firstuu male best friend ❤️Boys friendship mela nambikkai illaatha enaku kedacha oru god gifted friend🎀Unaku venaa unnoda frndslaa naa normalaana oru chat friendaaa irkalaam aana enaku enna poruthavaara nee rombaa spcl friend🩷 Neraya secrets share panrathukum Sadness share panrathukum happiness share panrathukum enaku kedacha oru super friend✨️En lifela chinnathulaye vanthu tholanjirukalamla neenu😂🩷' }
        };

        function updateShade(key, el) {
            document.getElementById('placeholder-text').style.display = 'none';
            document.getElementById('cardArea').style.display = 'block';
            document.getElementById('shadeTitle').style.display = 'block';
            document.getElementById('tapHint').style.display = 'block';

            const card = document.getElementById('bitmojiCard');
            const scrollBox = document.getElementById('scrollBox');
            
            // 1. Unflip card when changing content
            card.classList.remove('flipped'); 
            
            // 2. Update button styles
            document.querySelectorAll('.orb-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            
            // 3. Update Content with slight delay for smooth transition
            setTimeout(() => {
                document.getElementById('displayBitmoji').src = shadesData[key].img;
                document.getElementById('shadeTitle').innerText = shadesData[key].t;
                document.getElementById('shadeDescription').innerHTML = shadesData[key].d;
                
                // 4. RESET SCROLL TO TOP for new content
                scrollBox.scrollTop = 0;
            }, 200);
        }
    </script>
</body>
</html>
